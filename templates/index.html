<!DOCTYPE html>
<html>
<head>
    <title>Password Privacy Checker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 100px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        input { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 20px; background: white; border-radius: 5px; display: none; }
        .breached { color: red; font-weight: bold; }
        .safe { color: green; font-weight: bold; }
        .weak { color: orange; }
        .strong { color: green; }
    </style>
</head>
<body>
    <h1>Password Privacy Checker</h1>
    <p>Check if your password has been exposed in a data breach. Your password is never sent to our servers.</p>
    
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="checkPassword()">Check Password</button>
    
    <div id="result">
        <h2>Results</h2>
        <div id="strength"></div>
        <div id="breach"></div>
        <div id="issues"></div>
    </div>

    <script>
        async function checkPassword() {
            const password = document.getElementById("password").value;
            
            if (!password) {
                alert("Please enter a password");
                return;
            }

            const response = await fetch("/check", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({password: password})
            });

            const data = await response.json();
            
            document.getElementById("result").style.display = "block";
            
            const strengthDiv = document.getElementById("strength");
            const scoreClass = data.strength.score >= 4 ? "strong" : "weak";
            strengthDiv.innerHTML = `<p class="${scoreClass}">Strength: ${data.strength.score}/5 — ${data.strength.rating}</p>`;
            
            const breachDiv = document.getElementById("breach");
            if (data.breach.breached) {
                breachDiv.innerHTML = `<p class="breached">⚠️ Found in ${data.breach.count.toLocaleString()} data breaches!</p>`;
            } else {
                breachDiv.innerHTML = `<p class="safe">✅ Not found in any known breaches</p>`;
            }
            
            const issuesDiv = document.getElementById("issues");
            if (data.strength.issues.length > 0) {
                issuesDiv.innerHTML = `<p>Issues: ${data.strength.issues.join(", ")}</p>`;
            } else {
                issuesDiv.innerHTML = `<p class="safe">No issues found!</p>`;
            }
        }
    </script>
</body>
</html>
